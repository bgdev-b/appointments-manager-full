services:
  - type: web
    name: appointments-manager-backend
    env: node
    rootDir: appointments-manager-backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: DB_PATH
        value: ./data/database.sqlite
      - key: FRONTEND_ORIGIN
        sync: false
